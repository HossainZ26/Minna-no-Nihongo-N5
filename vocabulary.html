<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary (N5 Lessons) — Japanese Learning Station</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .lesson-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .lesson-btn {
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-light);
      background: var(--white);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all var(--transition);
      color: var(--text-dark);
    }

    .lesson-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .lesson-btn.active {
      background: var(--blue);
      color: var(--white);
      border-color: var(--blue);
    }

    .lesson-content {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .lesson-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .lesson-title .number {
      background: var(--blue);
      color: var(--white);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .vocab-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .vocab-table th {
      background: var(--navy);
      color: var(--white);
      padding: 1rem;
      text-align: left;
      font-weight: 700;
      border: 1px solid var(--gray-light);
    }

    .vocab-table td {
      padding: 0.9rem 1rem;
      border: 1px solid var(--gray-light);
      vertical-align: middle;
    }

    .vocab-table tbody tr:nth-child(even) {
      background: var(--gray-light);
    }

    .vocab-table tbody tr:hover {
      background: #e8eef5;
    }

    .vocab-num {
      font-weight: 700;
      color: var(--blue);
      text-align: center;
      width: 40px;
    }

    .vocab-jp {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      color: var(--navy);
      font-size: 1rem;
    }

    .vocab-jp .kanji {
      display: block;
      font-size: 0.85rem;
      color: var(--gray);
      font-weight: 400;
      margin-top: 0.2rem;
    }

    .vocab-en {
      color: var(--text-dark);
    }

    .vocab-bn {
      color: var(--red);
      font-weight: 500;
    }

    .lesson-stats {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-light);
      font-size: 0.9rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat strong {
      color: var(--blue);
    }

    @media (max-width: 768px) {
      .lesson-selector {
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 0.6rem;
      }

      .lesson-btn {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }

      .lesson-content {
        padding: 1rem;
      }

      .vocab-table {
        font-size: 0.85rem;
      }

      .vocab-table th,
      .vocab-table td {
        padding: 0.6rem 0.8rem;
      }

      .vocab-jp {
        font-size: 0.9rem;
      }

      .lesson-stats {
        gap: 1rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

<!-- ===== PAGE HEADER ===== -->
<header class="page-header">
  <h1>📚 N5 Vocabulary</h1>
  <p class="subtitle">25 Lessons • 450+ Words</p>
  <p class="jp">日本語 N5 語彙</p>
</header>

<!-- ===== MAIN ===== -->
<main>
  <!-- Lesson Selector -->
  <div class="lesson-selector" id="lessonSelector"></div>

  <!-- Lesson Content -->
  <div class="lesson-content" id="lessonContent"></div>

</main>

<!-- ===== SCRIPTS ===== -->
<script src="vocab-lessons.js"></script>
<script src="script.js"></script>
<script>
  const lessonSelector = document.getElementById('lessonSelector');
  const lessonContent = document.getElementById('lessonContent');
  let currentLesson = 1;

  // Render lesson buttons
  VOCAB_LESSONS.forEach((lesson) => {
    const btn = document.createElement('button');
    btn.className = `lesson-btn ${lesson.lesson === 1 ? 'active' : ''}`;
    btn.textContent = `Lesson ${lesson.lesson}`;
    btn.onclick = () => selectLesson(lesson.lesson);
    lessonSelector.appendChild(btn);
  });

  function selectLesson(lessonNum) {
    currentLesson = lessonNum;
    const lesson = VOCAB_LESSONS.find(l => l.lesson === lessonNum);

    // Update button states
    document.querySelectorAll('.lesson-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', (idx + 1) === lessonNum);
    });

    // Render lesson content
    const html = `
      <div class="lesson-title">
        <span class="number">${lesson.lesson}</span>
        <span>${lesson.title}</span>
      </div>

      <table class="vocab-table">
        <thead>
          <tr>
            <th style="width: 50px; text-align: center;">No.</th>
            <th style="width: 25%;">Japanese (Romaji)</th>
            <th style="width: 20%;">English</th>
            <th style="width: 25%;">Bangla (বাংলা)</th>
          </tr>
        </thead>
        <tbody>
          ${lesson.words.map(word => `
            <tr>
              <td class="vocab-num">${word.n}</td>
              <td class="vocab-jp">
                ${word.j}
                ${word.k ? `<span class="kanji">${word.k}</span>` : ''}
              </td>
              <td class="vocab-en">${word.e}</td>
              <td class="vocab-bn">${word.b}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <div class="lesson-stats">
        <div class="stat">
          <span>📝 Words in lesson:</span>
          <strong>${lesson.words.length}</strong>
        </div>
        <div class="stat">
          <span>✅ Total words:</span>
          <strong>${VOCAB_LESSONS.reduce((sum, l) => sum + l.words.length, 0)}</strong>
        </div>
      </div>
    `;

    lessonContent.innerHTML = html;
  }

  // Load first lesson on page load
  selectLesson(1);
</script>

</body>
