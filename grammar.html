<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
  <style>
    .lesson-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .lesson-btn {
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-light);
      background: var(--white);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all var(--transition);
      color: var(--text-dark);
      text-align: center;
    }

    .lesson-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .lesson-btn.active {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
    }

    .lesson-content {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .lesson-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .lesson-title .number {
      background: var(--red);
      color: var(--white);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .pattern-card {
      background: #f8f9fa;
      border-left: 4px solid var(--red);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
    }

    .pattern-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      cursor: pointer;
    }

    .pattern-header:hover {
      opacity: 0.8;
    }

    .pattern-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--navy);
    }

    .pattern-meaning {
      display: block;
      font-size: 0.85rem;
      color: var(--gray);
      margin-top: 0.3rem;
      font-weight: 400;
    }

    .toggle-icon {
      color: var(--red);
      font-weight: 700;
      font-size: 1rem;
      transition: transform var(--transition);
    }

    .pattern-card.collapsed .toggle-icon {
      transform: rotate(-90deg);
    }

    .pattern-body {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-light);
    }

    .pattern-card.collapsed .pattern-body {
      display: none;
    }

    .formula {
      background: var(--navy);
      color: var(--white);
      padding: 0.8rem 1rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .explanation {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    .examples-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .examples-list li {
      display: flex;
      flex-direction: column;
      padding: 0.8rem;
      background: var(--white);
      margin-bottom: 0.8rem;
      border-radius: 6px;
      border-left: 3px solid var(--blue);
    }

    .ex-jp {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      color: var(--navy);
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .ex-en {
      color: var(--text-dark);
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }

    .ex-bn {
      color: var(--red);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .lesson-stats {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-light);
      font-size: 0.9rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat strong {
      color: var(--red);
    }

    @media (max-width: 768px) {
      .lesson-selector {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 0.6rem;
      }

      .lesson-btn {
        padding: 0.6rem 0.8rem;
        font-size: 0.75rem;
      }

      .lesson-content {
        padding: 1rem;
      }

      .pattern-card {
        padding: 1rem;
      }

      .ex-jp {
        font-size: 0.9rem;
      }

      .lesson-stats {
        gap: 1rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<!-- ===== PAGE HEADER ===== -->
<header class="page-header">
  <h1>📖 N5 Grammar</h1>
  <p class="subtitle">10 Lessons • 40+ Grammar Patterns</p>
  <p class="jp">N5 文法ポイント</p>
</header>

<!-- ===== MAIN ===== -->
<main>
  <!-- Lesson Selector -->
  <div class="lesson-selector" id="lessonSelector"></div>

  <!-- Lesson Content -->
  <div class="lesson-content" id="lessonContent"></div>

</main>

<!-- ===== SCRIPTS ===== -->
<script src="grammar-lessons.js"></script>
<script src="script.js"></script>
<script>
  const lessonSelector = document.getElementById('lessonSelector');
  const lessonContent = document.getElementById('lessonContent');
  let currentLesson = 1;

  // Render lesson buttons
  GRAMMAR_LESSONS.forEach((lesson) => {
    const btn = document.createElement('button');
    btn.className = `lesson-btn ${lesson.lesson === 1 ? 'active' : ''}`;
    btn.textContent = `Lesson ${lesson.lesson}`;
    btn.onclick = () => selectLesson(lesson.lesson);
    lessonSelector.appendChild(btn);
  });

  function selectLesson(lessonNum) {
    currentLesson = lessonNum;
    const lesson = GRAMMAR_LESSONS.find(l => l.lesson === lessonNum);

    // Update button states
    document.querySelectorAll('.lesson-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', (idx + 1) === lessonNum);
    });

    // Render lesson content
    const html = `
      <div class="lesson-title">
        <span class="number">${lesson.lesson}</span>
        <span>${lesson.title}</span>
      </div>

      ${lesson.patterns.map((pattern, idx) => `
        <div class="pattern-card">
          <div class="pattern-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <div>
              <div class="pattern-title">${pattern.pattern}</div>
              <span class="pattern-meaning">${pattern.meaning}</span>
            </div>
            <span class="toggle-icon">▼</span>
          </div>
          <div class="pattern-body">
            <div class="formula">${pattern.formula}</div>
            <div class="explanation">${pattern.explanation}</div>
            <ul class="examples-list">
              ${pattern.examples.map(ex => `
                <li>
                  <span class="ex-jp">${ex.jp}</span>
                  <span class="ex-en">${ex.en}</span>
                  <span class="ex-bn">বাংলা: ${ex.bn}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
      `).join('')}

      <div class="lesson-stats">
        <div class="stat">
          <span>📝 Patterns in lesson:</span>
          <strong>${lesson.patterns.length}</strong>
        </div>
        <div class="stat">
          <span>✅ Total patterns:</span>
          <strong>${GRAMMAR_LESSONS.reduce((sum, l) => sum + l.patterns.length, 0)}</strong>
        </div>
      </div>
    `;

    lessonContent.innerHTML = html;
  }

  // Load first lesson on page load
  selectLesson(1);
</script>
